<!DOCTYPE html>
<html lang="th" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chemical Storage Survey</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Custom CSS (Minimalist Mobile First) -->
    <style>
        :root {
            --primary-color: #10b981; /* Minimalist Emerald Green */
            --primary-hover: #059669;
            --bg-dark: #121212;
            --bg-light: #f8f9fa;
            --card-dark: #1e1e1e;
            --card-light: #ffffff;
            --text-dark: #f3f4f6;
            --text-light: #1f2937;
        }

        body {
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            padding-bottom: 80px; /* Space for bottom nav */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Themes */
        [data-bs-theme="dark"] body { background-color: var(--bg-dark); color: var(--text-dark); }
        [data-bs-theme="light"] body { background-color: var(--bg-light); color: var(--text-light); }

        /* Minimal Cards */
        .minimal-card {
            border-radius: 1.25rem;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: background-color 0.3s;
        }
        [data-bs-theme="dark"] .minimal-card { background-color: var(--card-dark); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        [data-bs-theme="light"] .minimal-card { background-color: var(--card-light); }

        /* Form Inputs Customization */
        .form-control, .form-select {
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(128,128,128,0.2);
            transition: all 0.2s;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
            border-color: var(--primary-color);
        }
        .input-group-text { border-radius: 0.75rem 0 0 0.75rem; border: 1px solid rgba(128,128,128,0.2); }
        
        .btn-primary-custom {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 1rem;
            padding: 1rem;
            font-weight: 600;
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn-primary-custom:hover, .btn-primary-custom:active { background-color: var(--primary-hover); color: white; }
        .btn-primary-custom:active { transform: scale(0.98); }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: flex;
            justify-content: space-around;
            padding: 0.75rem 0 1.2rem 0; /* Extra padding bottom for safe area on iPhones */
            z-index: 1050;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        [data-bs-theme="dark"] .bottom-nav { background-color: rgba(30, 30, 30, 0.9); border-top: 1px solid #333; }
        [data-bs-theme="light"] .bottom-nav { background-color: rgba(255, 255, 255, 0.9); border-top: 1px solid #eee; }

        .nav-item {
            text-align: center;
            color: #888;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }
        .nav-item i { font-size: 1.5rem; margin-bottom: 2px; transition: transform 0.2s; }
        .nav-item span { font-size: 0.7rem; font-weight: 500; }
        
        .nav-item.active { color: var(--primary-color); }
        .nav-item.active i { transform: translateY(-3px); }

        /* Loading Overlay */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            z-index: 9999; display: none; justify-content: center; align-items: center; flex-direction: column; color: white;
        }

        /* Hide elements gracefully */
        .view-section {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Top Bar Minimal */
        .top-bar { padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    </style>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS (Excel Export) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner-border" style="width: 3rem; height: 3rem; color: var(--primary-color);" role="status"></div>
        <h5 class="mt-3 fw-light">กำลังโหลดข้อมูล...</h5>
    </div>

    <!-- Minimal Header -->
    <header class="top-bar">
        <div class="d-flex align-items-center">
            <i class="bi bi-heptagon-fill fs-3 me-2" style="color: var(--primary-color);"></i>
            <h5 class="fw-bold mb-0">Chemical Survey</h5>
        </div>
        <button class="btn btn-sm btn-outline-secondary rounded-circle border-0" id="theme-toggle" style="width: 40px; height: 40px;">
            <i class="bi bi-moon-stars-fill fs-5" id="theme-icon"></i>
        </button>
    </header>

    <div class="container-fluid px-3 pb-4">
        
        <!-- ============================================== -->
        <!-- VIEW 1: DATA ENTRY FORM (Main Default View)    -->
        <!-- ============================================== -->
        <div id="view-form" class="view-section">
            <div class="minimal-card p-4 mx-auto" style="max-width: 600px; margin-top: 20px;">
                <div class="text-center mb-4">
                    <div class="d-inline-flex justify-content-center align-items-center rounded-circle mb-3" style="width: 60px; height: 60px; background-color: rgba(16, 185, 129, 0.1);">
                        <i class="bi bi-pencil-square fs-2" style="color: var(--primary-color);"></i>
                    </div>
                    <h4 class="fw-bold" id="form-title">บันทึกจุดเก็บสารเคมี</h4>
                    <p class="text-muted small">กรุณากรอกข้อมูลเพื่อบันทึกการสำรวจ</p>
                    <span class="badge bg-warning text-dark d-none px-3 py-2 rounded-pill" id="edit-badge">โหมดแก้ไขข้อมูล</span>
                </div>

                <form id="survey-form">
                    <input type="hidden" id="record-id">
                    
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">โรงงาน (Factory)</label>
                        <select class="form-select form-select-lg" id="input-factory" required>
                            <option value="">-- เลือก Factory --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">ไลน์การผลิต (Line)</label>
                        <select class="form-select form-select-lg" id="input-line" required disabled>
                            <option value="">-- กรุณาเลือก Factory ก่อน --</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted small fw-semibold">จำนวนจุดเก็บสารเคมี</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-transparent"><i class="bi bi-123 text-muted"></i></span>
                            <input type="number" class="form-control" id="input-points" min="0" required placeholder="เช่น 5">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted small fw-semibold">จุดที่ตั้ง (Location)</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-transparent"><i class="bi bi-geo-alt text-muted"></i></span>
                            <input type="text" class="form-control" id="input-location" required placeholder="เช่น ตู้ A, มุมเสา B">
                        </div>
                    </div>

                    <div class="d-grid gap-3 mt-4">
                        <button type="submit" class="btn btn-primary-custom" id="btn-save">
                            บันทึกข้อมูล
                        </button>
                        <button type="button" class="btn btn-light rounded-pill fw-semibold text-muted py-2" id="btn-clear" style="border: 1px solid rgba(128,128,128,0.2);">
                            ล้างข้อมูล
                        </button>
                    </div>
                </form>
            </div>
        </div>


        <!-- ============================================== -->
        <!-- VIEW 2: DATA TABLE                             -->
        <!-- ============================================== -->
        <div id="view-table" class="view-section d-none">
            <div class="minimal-card p-3 p-md-4 mx-auto" style="max-width: 1000px;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0"><i class="bi bi-table me-2" style="color: var(--primary-color);"></i>รายการข้อมูล</h5>
                    <button class="btn btn-sm btn-outline-success rounded-pill px-3" onclick="exportToExcel()">
                        <i class="bi bi-file-earmark-excel me-1"></i> Export Excel
                    </button>
                </div>
                
                <div class="d-flex flex-column gap-2 mb-3">
                    <div class="input-group">
                        <span class="input-group-text bg-transparent"><i class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control" id="search-box" placeholder="ค้นหา Line, Location...">
                    </div>
                    <select class="form-select" id="filter-factory">
                        <option value="ALL">ทุก Factory</option>
                    </select>
                </div>

                <div class="table-responsive rounded-3 border">
                    <table class="table table-hover align-middle mb-0" id="data-table">
                        <thead class="table-light text-nowrap">
                            <tr>
                                <th>Factory</th>
                                <th>Line</th>
                                <th class="text-center">จำนวน</th>
                                <th>Location</th>
                                <th class="text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr><td colspan="5" class="text-center py-5 text-muted">ไม่มีข้อมูล</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>


        <!-- ============================================== -->
        <!-- VIEW 3: DASHBOARD (Summary & Charts)           -->
        <!-- ============================================== -->
        <div id="view-dashboard" class="view-section d-none">
            <div class="mx-auto" style="max-width: 1000px;">
                
                <!-- Summary Cards -->
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="minimal-card p-3 text-center h-100">
                            <i class="bi bi-building fs-3 text-primary mb-2 d-block"></i>
                            <h2 class="fw-bold mb-0" id="summary-factories">0</h2>
                            <span class="text-muted small">Factory</span>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="minimal-card p-3 text-center h-100">
                            <i class="bi bi-diagram-3 fs-3 text-info mb-2 d-block"></i>
                            <h2 class="fw-bold mb-0" id="summary-lines">0</h2>
                            <span class="text-muted small">Line</span>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="minimal-card p-4 text-center" style="background: linear-gradient(135deg, var(--primary-color), #047857); color: white;">
                            <i class="bi bi-droplet-fill fs-2 mb-2 d-block opacity-75"></i>
                            <h1 class="fw-bold mb-0 display-4" id="summary-points">0</h1>
                            <span class="opacity-75">จุดเก็บสารเคมีรวมทั้งหมด</span>
                        </div>
                    </div>
                </div>

                <!-- Charts -->
                <div class="row g-4">
                    <div class="col-12">
                        <div class="minimal-card p-3 p-md-4">
                            <h6 class="fw-bold mb-3 text-muted">จำนวนแยกตาม Factory</h6>
                            <div style="height: 250px; position: relative;">
                                <canvas id="barChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="minimal-card p-3 p-md-4">
                            <h6 class="fw-bold mb-3 text-muted">สัดส่วนจุดเก็บ</h6>
                            <div style="height: 250px; position: relative;">
                                <canvas id="pieChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav">
        <div class="nav-item active" id="nav-form" onclick="switchView('form')">
            <i class="bi bi-pencil-square"></i>
            <span>บันทึก</span>
        </div>
        <div class="nav-item" id="nav-table" onclick="switchView('table')">
            <i class="bi bi-card-list"></i>
            <span>รายการ</span>
        </div>
        <div class="nav-item" id="nav-dashboard" onclick="switchView('dashboard')">
            <i class="bi bi-pie-chart-fill"></i>
            <span>สถิติ</span>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;">
        <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-bold" id="toast-message"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ==========================================
        // 1. CONFIGURATION
        // ==========================================
        const SUPABASE_URL = "https://shyjmfpjzadoaftcqakb.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoeWptZnBqemFkb2FmdGNxYWtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0OTM3OTksImV4cCI6MjA5NzA2OTc5OX0.NEXqnCUkYOwMwAY4opsRT1GumXkXq5FvWYEH5hoZrBE";

        // ==========================================
        // 2. MASTER DATA
        // ==========================================
        const masterData = {
            "Factory1": ["Assy 1", "W/D 1", "M/C 1", "Press 1", "Core 1", "All Factory 1"],
            "Factory2": ["Assy 2", "W/D 2", "M/C 2", "Press 2", "Core 2", "All Factory 2"],
            "Factory3": ["Assy Scroll 3", "M/C SC 1", "M/C SC 2", "M/C SC 3", "Press 3", "W/D 3", "Core 3", "All Factory 3"],
            "Factory4": ["Core 4", "Assy 4", "M/C 4-1", "M/C 4-2", "Press 4", "W/D 4", "All Factory 4"],
            "InDirect": ["R&D", "IFA", "QA", "PLD", "Proc Store", "Proc Packing", "Engineering", "CS"]
        };

        // ==========================================
        // 3. GLOBAL VARIABLES & INIT
        // ==========================================
        let supabaseClient;
        let globalData = [];
        let barChartInstance = null;
        let pieChartInstance = null;
        let isEditing = false;
        let currentView = 'form';

        document.addEventListener("DOMContentLoaded", () => {
            initSystem();
        });

        function initSystem() {
            // Init Theme
            const themeToggleBtn = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const htmlTag = document.documentElement;
            
            themeToggleBtn.addEventListener('click', () => {
                const currentTheme = htmlTag.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                htmlTag.setAttribute('data-bs-theme', newTheme);
                themeIcon.className = newTheme === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-brightness-high-fill';
                
                // Set chart font colors dynamically
                Chart.defaults.color = newTheme === 'dark' ? '#f3f4f6' : '#1f2937';
                if(currentView === 'dashboard') renderCharts(); 
            });

            populateFactoryDropdowns();

            // Event Listeners
            document.getElementById('input-factory').addEventListener('change', handleFactoryChange);
            document.getElementById('survey-form').addEventListener('submit', handleFormSubmit);
            document.getElementById('btn-clear').addEventListener('click', resetForm);
            document.getElementById('filter-factory').addEventListener('change', renderTable);
            document.getElementById('search-box').addEventListener('input', renderTable);

            // Init Supabase
            if (SUPABASE_URL && SUPABASE_ANON_KEY) {
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                fetchData();
            }
        }

        // ==========================================
        // NAVIGATION SYSTEM (Switching Views)
        // ==========================================
        function switchView(viewName) {
            currentView = viewName;
            
            // Hide all views
            document.getElementById('view-form').classList.add('d-none');
            document.getElementById('view-table').classList.add('d-none');
            document.getElementById('view-dashboard').classList.add('d-none');
            
            // Remove active class from navs
            document.getElementById('nav-form').classList.remove('active');
            document.getElementById('nav-table').classList.remove('active');
            document.getElementById('nav-dashboard').classList.remove('active');

            // Show selected view & set active
            document.getElementById(`view-${viewName}`).classList.remove('d-none');
            document.getElementById(`nav-${viewName}`).classList.add('active');

            // Specific actions on view change
            window.scrollTo(0, 0);
            if(viewName === 'dashboard') {
                renderCharts(); // Re-render to fix sizing issues when hidden
            }
        }

        // ==========================================
        // UI & HELPERS
        // ==========================================
        function populateFactoryDropdowns() {
            const inputFactory = document.getElementById('input-factory');
            const filterFactory = document.getElementById('filter-factory');
            Object.keys(masterData).forEach(factory => {
                inputFactory.add(new Option(factory, factory));
                filterFactory.add(new Option(factory, factory));
            });
        }

        function handleFactoryChange(e) {
            const lineSelect = document.getElementById('input-line');
            const selectedFactory = e.target.value;
            lineSelect.innerHTML = '<option value="">-- เลือก Line --</option>';
            if (selectedFactory && masterData[selectedFactory]) {
                masterData[selectedFactory].forEach(line => lineSelect.add(new Option(line, line)));
                lineSelect.disabled = false;
            } else {
                lineSelect.innerHTML = '<option value="">-- กรุณาเลือก Factory ก่อน --</option>';
                lineSelect.disabled = true;
            }
        }

        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }

        function showToast(message, type = 'success') {
            const toastEl = document.getElementById('liveToast');
            const toastBody = document.getElementById('toast-message');
            
            // Customize colors based on type
            if(type === 'success') {
                toastEl.style.backgroundColor = 'var(--primary-color)';
                toastEl.style.color = 'white';
                toastBody.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i>${message}`;
            } else {
                toastEl.style.backgroundColor = '#ef4444'; // red
                toastEl.style.color = 'white';
                toastBody.innerHTML = `<i class="bi bi-exclamation-triangle-fill me-2"></i>${message}`;
            }
            
            new bootstrap.Toast(toastEl, { delay: 3000 }).show();
        }

        function resetForm() {
            document.getElementById('survey-form').reset();
            document.getElementById('input-line').disabled = true;
            document.getElementById('input-line').innerHTML = '<option value="">-- กรุณาเลือก Factory ก่อน --</option>';
            
            isEditing = false;
            document.getElementById('record-id').value = '';
            document.getElementById('edit-badge').classList.add('d-none');
            document.getElementById('btn-save').innerHTML = 'บันทึกข้อมูล';
            document.getElementById('btn-save').classList.replace('btn-warning', 'btn-primary-custom');
            document.getElementById('form-title').innerText = 'บันทึกจุดเก็บสารเคมี';
        }

        // ==========================================
        // SUPABASE CRUD
        // ==========================================
        async function fetchData() {
            if(!supabaseClient) return;
            try {
                const { data, error } = await supabaseClient
                    .from('chemical_storage_survey')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                globalData = data;
                updateDashboardSummary();
                renderTable();
                if(currentView === 'dashboard') renderCharts();
            } catch (error) {
                console.error(error);
                showToast("ไม่สามารถดึงข้อมูลได้", "danger");
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('record-id').value;
            const payload = {
                factory: document.getElementById('input-factory').value,
                line_name: document.getElementById('input-line').value,
                storage_point: parseInt(document.getElementById('input-points').value),
                location: document.getElementById('input-location').value
            };

            showLoading(true);
            try {
                if (isEditing && id) {
                    const { error } = await supabaseClient.from('chemical_storage_survey').update(payload).eq('id', id);
                    if (error) throw error;
                    showToast("อัปเดตข้อมูลสำเร็จ!");
                    switchView('table'); // Go back to table after edit
                } else {
                    const { error } = await supabaseClient.from('chemical_storage_survey').insert([payload]);
                    if (error) throw error;
                    showToast("บันทึกข้อมูลสำเร็จ!");
                }
                resetForm();
                fetchData();
            } catch (error) {
                showToast("เกิดข้อผิดพลาด: " + error.message, "danger");
            } finally {
                showLoading(false);
            }
        }

        async function deleteRecord(id) {
            if(confirm("ยืนยันการลบข้อมูลนี้?")) {
                showLoading(true);
                try {
                    const { error } = await supabaseClient.from('chemical_storage_survey').delete().eq('id', id);
                    if (error) throw error;
                    showToast("ลบข้อมูลสำเร็จ");
                    fetchData();
                } catch (error) {
                    showToast("ลบข้อมูลไม่สำเร็จ", "danger");
                } finally {
                    showLoading(false);
                }
            }
        }

        function editRecord(id) {
            const record = globalData.find(item => item.id == id);
            if (!record) return;

            switchView('form'); // Switch to form view
            isEditing = true;
            document.getElementById('record-id').value = record.id;
            
            const factorySelect = document.getElementById('input-factory');
            factorySelect.value = record.factory;
            factorySelect.dispatchEvent(new Event('change'));
            
            setTimeout(() => { document.getElementById('input-line').value = record.line_name; }, 50);

            document.getElementById('input-points').value = record.storage_point;
            document.getElementById('input-location').value = record.location || '';

            document.getElementById('edit-badge').classList.remove('d-none');
            document.getElementById('btn-save').innerHTML = '<i class="bi bi-pencil-square me-2"></i>อัปเดตข้อมูล';
            document.getElementById('btn-save').classList.replace('btn-primary-custom', 'btn-warning');
            document.getElementById('form-title').innerText = 'แก้ไขข้อมูล';
        }

        // ==========================================
        // DATA RENDERING & EXPORT
        // ==========================================
        function updateDashboardSummary() {
            const uniqueFactories = new Set(globalData.map(item => item.factory)).size;
            const uniqueLines = new Set(globalData.map(item => item.line_name)).size;
            const totalPoints = globalData.reduce((sum, item) => sum + item.storage_point, 0);

            document.getElementById("summary-factories").textContent = uniqueFactories;
            document.getElementById("summary-lines").textContent = uniqueLines;
            document.getElementById("summary-points").textContent = totalPoints;
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            const filterFact = document.getElementById('filter-factory').value;
            const searchText = document.getElementById('search-box').value.toLowerCase();

            let filteredData = globalData;
            if (filterFact !== 'ALL') filteredData = filteredData.filter(item => item.factory === filterFact);
            if (searchText) {
                filteredData = filteredData.filter(item => 
                    item.line_name.toLowerCase().includes(searchText) || 
                    (item.location && item.location.toLowerCase().includes(searchText))
                );
            }

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center py-5 text-muted">ไม่พบข้อมูล</td></tr>';
                return;
            }

            tbody.innerHTML = filteredData.map(item => `
                <tr>
                    <td class="fw-semibold text-muted">${item.factory}</td>
                    <td class="fw-bold">${item.line_name}</td>
                    <td class="text-center"><span class="badge rounded-pill" style="background-color: rgba(16, 185, 129, 0.2); color: var(--primary-color); font-size: 0.9rem;">${item.storage_point}</span></td>
                    <td class="small"><i class="bi bi-geo-alt text-muted me-1"></i>${item.location || '-'}</td>
                    <td class="text-center text-nowrap">
                        <button class="btn btn-sm btn-light text-primary me-1 rounded-circle" style="width: 32px; height: 32px;" onclick="editRecord(${item.id})"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-light text-danger rounded-circle" style="width: 32px; height: 32px;" onclick="deleteRecord(${item.id})"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        
        // ฟังก์ชัน Export to Excel
        function exportToExcel() {
            if (globalData.length === 0) {
                showToast("ไม่มีข้อมูลสำหรับ Export", "danger");
                return;
            }

            // นำเงื่อนไข Filter และ Search มาใช้เพื่อให้ Export เฉพาะข้อมูลที่กำลังแสดงอยู่
            const filterFact = document.getElementById('filter-factory').value;
            const searchText = document.getElementById('search-box').value.toLowerCase();

            let exportData = globalData;
            if (filterFact !== 'ALL') exportData = exportData.filter(item => item.factory === filterFact);
            if (searchText) {
                exportData = exportData.filter(item => 
                    item.line_name.toLowerCase().includes(searchText) || 
                    (item.location && item.location.toLowerCase().includes(searchText))
                );
            }

            if (exportData.length === 0) {
                showToast("ไม่พบข้อมูลที่ตรงกับเงื่อนไข", "danger");
                return;
            }

            // จัดรูปแบบข้อมูลสำหรับ Excel
            const formattedData = exportData.map(item => ({
                "โรงงาน (Factory)": item.factory,
                "ไลน์ (Line)": item.line_name,
                "จำนวนจุดเก็บ": item.storage_point,
                "จุดที่ตั้ง (Location)": item.location || '-',
                "วันที่บันทึก": new Date(item.created_at).toLocaleString('th-TH')
            }));

            // สร้าง Workbook และ Worksheet
            const ws = XLSX.utils.json_to_sheet(formattedData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Chemical Storage Survey");

            // สร้างชื่อไฟล์พร้อมวันที่
            const dateStr = new Date().toISOString().split('T')[0];
            const fileName = `Chemical_Storage_Survey_${dateStr}.xlsx`;

            // สั่งโหลดไฟล์
            XLSX.writeFile(wb, fileName);
            showToast("Export Excel สำเร็จ!");
        }

        function renderCharts() {
            if (globalData.length === 0) return;

            const factoryData = {};
            globalData.forEach(item => {
                factoryData[item.factory] = (factoryData[item.factory] || 0) + item.storage_point;
            });

            const labels = Object.keys(factoryData);
            const dataValues = Object.values(factoryData);

            const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
            const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
            Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

            // Modern color palette
            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ef4444', '#8b5cf6'];

            // Bar Chart
            if (barChartInstance) barChartInstance.destroy();
            barChartInstance = new Chart(document.getElementById('barChart').getContext('2d'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: colors.map(c => c + 'CC'), // 80% opacity
                        borderRadius: 6,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: gridColor }, border: { display: false } },
                        x: { grid: { display: false }, border: { display: false } }
                    }
                }
            });

            // Pie Chart
            if (pieChartInstance) pieChartInstance.destroy();
            pieChartInstance = new Chart(document.getElementById('pieChart').getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: colors,
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } }
                }
            });
        }
    </script>
